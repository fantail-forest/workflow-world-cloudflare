name: E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/workflow-world-cloudflare/**'
  pull_request:
    paths:
      - 'packages/workflow-world-cloudflare/**'
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build packages
        run: yarn build

      - name: Run unit tests
        run: yarn test
        working-directory: packages/workflow-world-cloudflare

      - name: Run e2e tests (Miniflare)
        run: yarn test:e2e
        working-directory: packages/workflow-world-cloudflare
